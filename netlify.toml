# Netlify deployment configuration for Next.js.
# The official Next.js Runtime plugin handles SSR, ISR, image optimization,
# and routing automatically.

[build]
  # Stamp the built commit into /commit.txt so the Lighthouse CI workflow can
  # confirm it audits the current commit's deploy (not a stale preview).
  command = "mkdir -p public && printf '%s' \"$COMMIT_REF\" > public/commit.txt && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22.12.0"
  # Netlify auto-detects pnpm from the committed pnpm-lock.yaml and provisions
  # this version directly (no Corepack), avoiding Corepack signature-key issues.
  PNPM_VERSION = "11.7.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"
